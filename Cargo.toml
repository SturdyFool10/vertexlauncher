[workspace]
resolver = "3"
members = [
    "crates/auth",
    "crates/config",
    "crates/curseforge",
    "crates/fontloader",
    "crates/installation",
    "crates/instances",
    "crates/launcher_runtime",
    "crates/launcher_ui",
    "crates/vertexlauncher",
    "crates/modprovider",
    "crates/modrinth",
    "crates/runtime_bootstrap",
    "crates/textui",
]
default-members = [
    "crates/vertexlauncher",
]

[workspace.dependencies]
eframe = { version = "0.33.3", features = ["wgpu", "serde"] }
egui = { version = "0.33.3", features = ["serde"] }
serde = { version = "1.0.228", features = ["derive", "serde_derive"] }
wgpu = "28.0.0"
fontdb = "0.23.0"
thiserror = "2.0.18"
toml = "1.0.4"
serde_json = "1.0.149"
humantime = "2.3.0"
humantime-serde = "1.1.1"
egui_extras = { version = "0.33.3", features = ["http", "image", "gif", "svg", "chrono", "datepicker", "syntect", "serde"] }
image = "0.25.9"
cosmic-text = "0.18.2"
glyphon = "0.10.0"
pulldown-cmark = "0.13.1"
syntect = "5.3.0"
tokio = { version = "1.48.0", features = ["rt-multi-thread", "sync", "time"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["fmt", "env-filter"] }
url = "2.5.7"

# internal crates
auth = { path = "crates/auth" }
config = { path = "crates/config" }
curseforge = { path = "crates/curseforge" }
installation = { path = "crates/installation" }
instances = { path = "crates/instances" }
launcher_runtime = { path = "crates/launcher_runtime" }
launcher_ui = { path = "crates/launcher_ui" }
modrinth = { path = "crates/modrinth" }
modprovider = { path = "crates/modprovider" }
fontloader = { path = "crates/fontloader" }
runtime_bootstrap = { path = "crates/runtime_bootstrap" }
textui = { path = "crates/textui" }

[profile.dev]
# Your crates (workspace members): keep normal dev behavior
opt-level = 0
debug = 2
incremental = true
codegen-units = 256

[profile.dev.package."*"]
# All dependencies (everything not in your workspace): optimize hard
opt-level = 3
debug = 1
incremental = true
codegen-units = 16
